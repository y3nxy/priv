<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discord Hunter V2.4 | Y3NXY</title>
    <style>
        :root { --bg: #000; --panel: #0a0a0a; --border: #1a1a1a; --accent: #fff; --dim: #555; --red: #ff3333; }
        * { box-sizing: border-box; transition: all 0.15s ease; }
        body { background: var(--bg); color: var(--accent); font-family: 'Inter', -apple-system, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--panel); }
        header h1 { font-size: 14px; letter-spacing: 2px; margin: 0; font-weight: 900; }
        .sub-h { font-size: 10px; color: var(--dim); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }

        main { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar Menu */
        .sidebar { width: 380px; border-right: 1px solid var(--border); padding: 25px; overflow-y: auto; background: var(--panel); display: flex; flex-direction: column; }
        
        /* Console Area */
        .console-side { flex: 1; display: flex; flex-direction: column; padding: 20px; background: #000; }

        /* Stats Grid */
        .stats-bar { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 25px; }
        .stat-card { border: 1px solid var(--border); padding: 15px; text-align: center; border-radius: 4px; background: #050505; }
        .stat-val { font-size: 22px; font-weight: 800; display: block; font-family: 'Courier New', monospace; }
        .stat-lbl { font-size: 9px; color: var(--dim); text-transform: uppercase; margin-top: 5px; font-weight: 700; }

        /* Form Elements */
        .section-title { font-size: 10px; font-weight: 800; text-transform: uppercase; margin: 20px 0 12px 0; color: var(--dim); letter-spacing: 1px; border-left: 2px solid #fff; padding-left: 8px; }
        .input-box { margin-bottom: 15px; }
        label { display: block; font-size: 9px; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; font-weight: 700; }
        
        input, select { 
            width: 100%; background: #000; border: 1px solid var(--border); color: #fff; 
            padding: 12px; font-size: 12px; border-radius: 4px; font-family: monospace; outline: none;
        }
        input:focus { border-color: #444; }
        input::placeholder { color: #333; }
        
        /* Action Buttons */
        .btn-main { background: #fff; color: #000; width: 100%; padding: 15px; font-size: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; border-radius: 4px; border: none; margin-top: 10px; letter-spacing: 1px; }
        .btn-stop { background: var(--red); color: #fff; width: 100%; padding: 15px; font-size: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; border-radius: 4px; border: none; margin-top: 10px; display: none; }
        .btn-sec { background: transparent; color: #fff; border: 1px solid var(--border); width: 100%; padding: 10px; font-size: 10px; text-transform: uppercase; cursor: pointer; border-radius: 4px; margin-top: 8px; font-weight: 700; }
        
        button:hover { opacity: 0.8; }

        /* Terminal Output */
        .terminal-header { font-size: 10px; color: var(--dim); text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; display: flex; justify-content: space-between; }
        #log { flex: 1; font-family: 'Courier New', monospace; font-size: 12px; overflow-y: auto; display: flex; flex-direction: column-reverse; color: #555; }
        .log-line { padding: 4px 0; border-bottom: 1px solid #050505; white-space: pre-wrap; }
        .avail { color: #fff; font-weight: bold; background: rgba(255,255,255,0.05); }
        .sys { color: #888; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>Discord Hunter V2.4</h1>
        <div class="sub-h">Advanced Username Availability Checker</div>
    </div>
    <div class="sub-h">MADE BY Y3NXY</div>
</header>

<main>
    <section class="sidebar">
        <div class="stats-bar">
            <div class="stat-card"><span class="stat-val" id="checked">0</span><span class="stat-lbl">Checked</span></div>
            <div class="stat-card"><span class="stat-val" id="available">0</span><span class="stat-lbl">Available</span></div>
            <div class="stat-card"><span class="stat-val" id="taken">0</span><span class="stat-lbl">Taken</span></div>
            <div class="stat-card"><span class="stat-val" id="cpm">0</span><span class="stat-lbl">Checks/Min</span></div>
        </div>

        <div class="section-title">🔐 Authentication</div>
        <div class="input-box">
            <label>Single Token</label>
            <input type="text" id="token" placeholder="mfa.xxxxxxxx...">
        </div>
        <div class="input-box">
            <label>Webhook URL</label>
            <input type="text" id="webhook" placeholder="https://discord.com/api/webhooks/...">
        </div>

        <div class="section-title">⚙️ Configuration</div>
        <div class="input-box">
            <label>Delay (seconds)</label>
            <input type="number" id="delay" value="1.0" step="0.1" placeholder="1.0">
        </div>
        <div class="input-box">
            <label>Mode</label>
            <select id="mode">
                <option value="1">Username List (usernames.txt)</option>
                <option value="2">4-Char Mixed</option>
                <option value="3">4-Letter Only</option>
                <option value="4">3-Char Turbo</option>
            </select>
        </div>

        <button class="btn-main" id="startBtn" onclick="start()">START CHECKING</button>
        <button class="btn-stop" id="stopBtn" onclick="stop()">Stop</button>
        <button class="btn-sec" onclick="testWebhook()">Test Webhook</button>
    </section>

    <section class="console-side">
        <div class="terminal-header">
            <span>📋 Activity Log</span>
            <span id="status-tag" style="color:#444">IDLE</span>
        </div>
        <div id="log">
            <div class="log-line sys">[*] System ready. Configure settings and press START CHECKING.</div>
        </div>
    </section>
</main>

<script>
    function testWebhook() {
        const url = document.getElementById('webhook').value;
        fetch('/test_webhook', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({url: url}) });
    }

    function start() {
        const data = {
            token: document.getElementById('token').value,
            webhook: document.getElementById('webhook').value,
            delay: document.getElementById('delay').value,
            mode: document.getElementById('mode').value
        };
        
        if(!data.token) return alert("Discord Token required");

        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        document.getElementById('status-tag').innerText = "RUNNING";
        document.getElementById('status-tag').style.color = "#fff";

        fetch('/start', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        setInterval(refreshStats, 800);
    }

    function stop() {
        location.reload(); 
    }

    function refreshStats() {
        fetch('/stats').then(res => res.json()).then(data => {
            document.getElementById('checked').innerText = data.stats.checked;
            document.getElementById('available').innerText = data.stats.available;
            document.getElementById('taken').innerText = data.stats.taken;
            document.getElementById('cpm').innerText = data.stats.cpm;
            
            const logDiv = document.getElementById('log');
            data.logs.forEach(msg => {
                const div = document.createElement('div');
                div.className = msg.includes('AVAILABLE') ? 'log-line avail' : 'log-line';
                div.innerText = msg;
                logDiv.prepend(div);
            });
        });
    }
</script>
</body>
</html>
